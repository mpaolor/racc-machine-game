name: Build and Deploy

on:
  push:
    branches:
      - main  # Runs every time you push to main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production --base-href "https://mpaolor.github.io/racc-machine-game/"

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/racc-machine-game/browser/

      - name: Deploy
        uses: actions/deploy-pages@v4