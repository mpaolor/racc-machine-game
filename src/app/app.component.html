<div class="game-container">
  <h1>Racc Slot Machine</h1>

  <div class="reels-container">
    @for (symbolIndex of reels(); track $index) {
      <div class="reel-window">
        <div class="symbol-holder">
          @if (isSpinning()) {
            <div class="blur-strip">
              @for (s of symbols; track $index) {
                <div class="symbol-card">{{ s }}</div>
              }
              <div class="symbol-card">{{ symbols[0] }}</div>
            </div>
          } @else {
            <div class="static-symbol">
              {{ symbols[symbolIndex] }}
            </div>
          }
        </div>
      </div>
    }
  </div>

  <div class="ui-section">
    <h2 [class.win-text]="message().includes('WIN')">{{ message() }}</h2>
    
    <button 
      #spinButton 
      (click)="spin()" 
      [disabled]="isSpinning()"
      [class.active]="!isSpinning()">
      {{ isSpinning() ? 'SPINNING...' : 'SPIN' }}
    </button>
  </div>
</div>
